<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente de Gastos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --border: #e0ddd7;
    --text: #1a1916;
    --muted: #7a7772;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --danger: #c0392b;
    --danger-light: #fdf0ee;
    --user-bg: #2d5a3d;
    --user-text: #ffffff;
    --ok-bg: #e8f0ea;
    --ok-text: #1a3d24;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 4px;
  }

  #chat-container {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 480px;
  }

  #messages {
    flex: 1;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    min-height: 380px;
    max-height: 480px;
  }

  .bubble {
    max-width: 88%;
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 0.88rem;
    line-height: 1.55;
  }

  .bubble.bot {
    background: var(--bg);
    color: var(--text);
    align-self: flex-start;
    border: 1px solid var(--border);
  }

  .bubble.user {
    background: var(--user-bg);
    color: var(--user-text);
    align-self: flex-end;
  }

  .bubble.ok {
    background: var(--ok-bg);
    color: var(--ok-text);
    align-self: flex-start;
    border: 1px solid #b8d4be;
  }

  .bubble.error {
    background: var(--danger-light);
    color: var(--danger);
    align-self: flex-start;
    border: 1px solid #f0c0bb;
  }

  .bubble img {
    max-width: 200px;
    border-radius: 10px;
    margin-bottom: 6px;
    display: block;
  }

  .bubble strong { font-weight: 500; }

  .bubble .linea-gasto {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid #c8dece;
    font-size: 0.84rem;
  }
  .bubble .linea-gasto:last-child { border-bottom: none; }
  .bubble .cat { font-size: 0.75rem; color: #4a7a5a; margin-top: 1px; }
  .bubble .importe { font-family: 'DM Mono', monospace; font-weight: 500; }

  .typing-dots {
    display: flex; gap: 4px; align-items: center; padding: 14px 15px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 14px; align-self: flex-start;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  #input-area {
    border-top: 1px solid var(--border);
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #preview-box {
    display: none;
    position: relative;
  }
  #preview-box img {
    width: 64px; height: 64px; object-fit: cover;
    border-radius: 10px; border: 1px solid var(--border);
  }
  #remove-img {
    position: absolute; top: -6px; left: 56px;
    background: var(--danger); color: white;
    border: none; border-radius: 50%; width: 18px; height: 18px;
    font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  #input-row {
    display: flex; gap: 8px; align-items: flex-end;
  }

  #txt {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 22px;
    font-size: 0.88rem;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    outline: none;
    resize: none;
    line-height: 1.4;
    max-height: 90px;
    overflow-y: auto;
  }
  #txt:focus { border-color: var(--accent); }

  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 16px;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: var(--border); }

  #send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: none; background: var(--accent);
    color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 16px;
    transition: opacity 0.15s;
  }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #file-input { display: none; }
</style>
</head>
<body>

<header>
  <h1>Agente de Gastos</h1>
  <p>Escribe un gasto o sube la foto de un ticket</p>
</header>

<div id="chat-container">
  <div id="messages">
    <div class="bubble bot">
      Hola 👋 Puedes escribirme un gasto o subir la foto de un ticket y lo apunto todo en tu hoja de Google Sheets.<br><br>
      Ejemplos:<br>
      • "Gasté 45€ en el super"<br>
      • Sube una foto de ticket 📷
    </div>
  </div>

  <div id="input-area">
    <div id="preview-box">
      <img id="preview-img" src="" alt="ticket" />
      <button id="remove-img" onclick="quitarImagen()">✕</button>
    </div>
    <div id="input-row">
      <label for="file-input" class="icon-btn" title="Subir ticket">📷</label>
      <input type="file" id="file-input" accept="image/*" onchange="seleccionarImagen(event)" />
      <textarea id="txt" rows="1" placeholder="Escribe un gasto..."></textarea>
      <button id="send-btn" onclick="enviar()">↑</button>
    </div>
  </div>
</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwX1A-iytCbK70QM9X-qhg47CHCy0pVYMHVNY3wX0k6COrS5H0WjfsL5zrhh_yGtI_z/exec";
const CLAUDE_URL = "https://api.anthropic.com/v1/messages";

let imagenBase64 = null;
let imagenMime = null;

const msgs = document.getElementById("messages");
const txt = document.getElementById("txt");
const sendBtn = document.getElementById("send-btn");
const previewBox = document.getElementById("preview-box");
const previewImg = document.getElementById("preview-img");

txt.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviar(); } });
txt.addEventListener("input", () => {
  txt.style.height = "auto";
  txt.style.height = Math.min(txt.scrollHeight, 90) + "px";
});

function seleccionarImagen(e) {
  const file = e.target.files[0];
  if (!file) return;
  imagenMime = file.type;
  const reader = new FileReader();
  reader.onload = ev => {
    imagenBase64 = ev.target.result.split(",")[1];
    previewImg.src = ev.target.result;
    previewBox.style.display = "block";
  };
  reader.readAsDataURL(file);
}

function quitarImagen() {
  imagenBase64 = null; imagenMime = null;
  previewBox.style.display = "none";
  previewImg.src = "";
  document.getElementById("file-input").value = "";
}

function addBubble(html, tipo) {
  const d = document.createElement("div");
  d.className = "bubble " + tipo;
  d.innerHTML = html;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

function showTyping() {
  const d = document.createElement("div");
  d.className = "typing-dots"; d.id = "typing";
  d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

async function guardarEnSheet(gasto) {
  const r = await fetch(SHEET_URL, { method: "POST", body: JSON.stringify(gasto) });
  return await r.json();
}

async function enviar() {
  const texto = txt.value.trim();
  if (!texto && !imagenBase64) return;
  sendBtn.disabled = true;

  const hoy = new Date().toLocaleDateString("es-ES");

  if (imagenBase64) {
    const imgSrc = previewImg.src;
    addBubble(`<img src="${imgSrc}" />${texto ? texto : "Aquí el ticket"}`, "user");
  } else {
    addBubble(texto, "user");
  }

  txt.value = ""; txt.style.height = "auto";
  showTyping();

  try {
    let userContent;

    if (imagenBase64) {
      userContent = [
        { type: "image", source: { type: "base64", media_type: imagenMime, data: imagenBase64 } },
        { type: "text", text: texto || "Analiza este ticket y extrae todos los gastos." }
      ];
    } else {
      userContent = texto;
    }

    const systemPrompt = imagenBase64
      ? `Eres un asistente que analiza tickets de compra. Extrae TODOS los artículos o líneas de gasto del ticket.
Responde SOLO con un JSON válido sin backticks con este formato exacto:
{"gastos":[{"descripcion":"...","categoria":"...","importe":0.0},...]}
Categorías posibles: Alimentación, Transporte, Restaurantes, Salud, Ocio, Hogar, Ropa, Tecnología, Otros.
Si hay un total general, no lo incluyas como línea aparte. Los importes deben ser números sin símbolo €.
Si no puedes leer el ticket responde: {"error":"no_legible"}`
      : `Eres un asistente que extrae información de gastos del texto.
Responde SOLO con un JSON válido sin backticks con este formato:
{"gastos":[{"descripcion":"...","categoria":"...","importe":0.0}]}
Categorías: Alimentación, Transporte, Restaurantes, Salud, Ocio, Hogar, Ropa, Tecnología, Otros.
Importe sin símbolo €. Si no hay gasto claro: {"error":"no_gasto"}`;

    const res = await fetch(CLAUDE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userContent }]
      })
    });

    const data = await res.json();
    const raw = data.content.map(i => i.text || "").join("").trim();
    let parsed;
    try { parsed = JSON.parse(raw); } catch(e) { parsed = { error: "parse" }; }

    removeTyping();
    quitarImagen();

    if (parsed.error) {
      const msgs2 = { no_gasto: "No he detectado ningún gasto. Prueba con: <em>Gasté 20€ en farmacia</em>", no_legible: "No puedo leer bien el ticket. Prueba con mejor iluminación.", parse: "Error procesando la respuesta. Inténtalo de nuevo." };
      addBubble(msgs2[parsed.error] || "Error desconocido.", "error");
      sendBtn.disabled = false; return;
    }

    const gastos = parsed.gastos || [];
    if (gastos.length === 0) { addBubble("No encontré gastos. Inténtalo de nuevo.", "error"); sendBtn.disabled = false; return; }

    let total = 0;
    let html = gastos.length > 1 ? `<strong>He encontrado ${gastos.length} gastos:</strong><br><br>` : "";
    for (const g of gastos) {
      total += g.importe;
      html += `<div class="linea-gasto"><div><div>${g.descripcion}</div><div class="cat">${g.categoria}</div></div><div class="importe">${g.importe.toFixed(2)}€</div></div>`;
    }
    if (gastos.length > 1) html += `<div style="text-align:right;margin-top:8px;font-family:'DM Mono',monospace;font-weight:500;font-size:0.85rem;">Total: ${total.toFixed(2)}€</div>`;

    addBubble(html, "ok");

    let errores = 0;
    for (const g of gastos) {
      try {
        const r = await guardarEnSheet({ fecha: hoy, descripcion: g.descripcion, categoria: g.categoria, importe: g.importe });
        if (r.status !== "ok") errores++;
      } catch(e) { errores++; }
    }

    if (errores === 0) {
      addBubble(`✓ ${gastos.length === 1 ? "Apuntado" : "Todos apuntados"} en tu hoja de Google Sheets`, "bot");
    } else {
      addBubble(`Guardé ${gastos.length - errores} de ${gastos.length}. Comprueba tu script.`, "error");
    }

  } catch(e) {
    removeTyping();
    addBubble("Error de conexión. Comprueba tu internet.", "error");
  }

  sendBtn.disabled = false;
  txt.focus();
}
</script>
</body>
</html>
